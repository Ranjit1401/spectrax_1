name: SpectraX CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install Frontend Dependencies
      run: npm install

    - name: Lint Frontend
      run: npm run lint

    - name: Build Frontend
      run: npm run build

    - name: Install Backend Dependencies
      run: |
        cd server
        npm install

    - name: Check Backend
      run: |
        cd server
        # Add backend test/lint if exists
        # npm test 
